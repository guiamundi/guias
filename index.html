<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuiaMundi</title>
<style>
  body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
       background:#1A1A2E;color:#fff;font-family:sans-serif;text-align:center;padding:20px}
  a{color:#C9922A;text-decoration:none;font-weight:600}
</style>
</head>
<body>
  <div id="msg">Abriendo tu guía…</div>
  <script>
    var last = null;
    try { last = localStorage.getItem('guiamundi_last_guide'); } catch(e){}

    if (last) {
      window.location.replace(last);
    } else {
      document.getElementById('msg').innerHTML =
        'No hay ninguna guía guardada en este dispositivo.<br><br>' +
        '<a href="https://guiamundi.es">Ir a GuiaMundi.es</a>';
    }
  </script>
</body>
</html>
